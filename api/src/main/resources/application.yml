spring:
  datasource:
    url: jdbc:h2:mem:timesheet;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: UTC
  h2:
    console:
      enabled: true
      path: /h2-console
server:
  port: 8080
  error:
    include-message: always
logging:
  level:
    org.hibernate.SQL: warn

