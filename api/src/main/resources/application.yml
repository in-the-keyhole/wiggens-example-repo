server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:timesheet;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  h2:
    console:
      enabled: true

logging:
  level:
    org.springframework: INFO

